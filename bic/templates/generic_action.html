{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
    <h2>{{ title }}</h2>
    <form action="/action/{{ action_path }}" method="post">
        {% for field in form_fields %}
            <div class="form-group">
                <label for="{{ field.name }}">{{ field.label }}</label>
                {% if field.type == 'select' %}
                    <select id="{{ field.name }}" name="{{ field.name }}" {% if field.required %}required{% endif %}>
                        {% for option in field.options %}
                            <option value="{{ option }}">{{ option }}</option>
                        {% endfor %}
                    </select>
                {% elif field.type == 'select_from_db' %}
                    <select id="{{ field.name }}" name="{{ field.name }}" {% if field.required %}required{% endif %}>
                        {% for option in field.options %}
                            <option value="{{ option.id }}">{{ option[field.display_key] }}</option>
                        {% endfor %}
                    </select>
                {% else %}
                    <input type="{{ field.type }}" id="{{ field.name }}" name="{{ field.name }}" value="{{ field.value | default('') }}" {% if field.required %}required{% endif %}>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit">Submit</button>
    </form>
{% endblock %}
