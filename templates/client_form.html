{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
    <h1>{{ title }}</h1>
    <form method="post">
        <div>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" value="{{ client.name if client else '' }}" required>
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" value="{{ client.email if client else '' }}">
        </div>
        <div>
            <label for="asn">ASN:</label>
            <input type="number" id="asn" name="asn" value="{{ client.asn if client else '' }}">
        </div>
        <div>
            <label for="allow_smtp">Allow SMTP:</label>
            <input type="checkbox" id="allow_smtp" name="allow_smtp" {% if client and client.allow_smtp %}checked{% endif %}>
        </div>
        <button type="submit">Save</button>
        <a href="/clients" class="button">Cancel</a>
    </form>
{% endblock %}
