{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="flex items-center justify-center h-full">
    <div class="w-full max-w-md">
        <div class="card">
            <h1 class="text-2xl font-bold text-center mb-6">Admin Login</h1>
            {% if request.query_params.get('error') %}
                <div class="bg-red-500 text-white p-3 rounded-md mb-4">
                    Invalid username or password. Please try again.
                </div>
            {% endif %}
            <form method="post" action="/action/auth/login">
                <div class="mb-4">
                    <label for="username" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Username</label>
                    <input type="text" name="username" id="username" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 dark:bg-gray-700 dark:border-gray-600" required>
                </div>
                <div class="mb-6">
                    <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Password</label>
                    <input type="password" name="password" id="password" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 dark:bg-gray-700 dark:border-gray-600" required>
                </div>
                <div class="flex items-center justify-between">
                    <button type="submit" class="action-button-green w-full">Login</button>
                </div>
                <div class="text-center mt-4">
                    <button type="button" id="login-passkey" class="action-button-blue w-full">Login with Passkey</button>
                </div>
                <div class="text-center mt-4">
                    <a href="#" class="text-sm text-blue-500 hover:underline">Forgot Password?</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById('login-passkey').addEventListener('click', async () => {
        const username = document.getElementById('username').value;
        if (!username) {
            alert('Please enter your username to log in with a passkey.');
            return;
        }

        try {
            // 1. Get authentication options from the server
            const response = await fetch(`/api/passkey/auth/options/${username}`);
            const options = await response.json();

            // 2. Use the browser's WebAuthn API to get an assertion
            const assertion = await navigator.credentials.get({ publicKey: options });

            // 3. Send the assertion to the server for verification
            const verifyResponse = await fetch(`/api/passkey/auth/verify/${username}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(assertion.toJSON()),
            });

            const verifyResult = await verifyResponse.json();

            if (verifyResult.success) {
                // On successful passkey login, the server will set the cookie.
                // We just need to redirect to the dashboard.
                window.location.href = "/";
            } else {
                alert('Passkey login failed.');
            }
        } catch (e) {
            console.error('Passkey login failed:', e);
            alert('Passkey login failed. See console for details.');
        }
    });
</script>
{% endblock %}
