<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BIC IPAM{% endblock %}</title>
    <link href="{{ url_for('static', path='/style.css') }}" rel="stylesheet">
</head>
<body>
    {% macro render_menu(menu_items) %}
        {% for name, item in menu_items.items() %}
            {% if item.type == 'submenu' %}
                <div class="nav-dropdown">
                    <button class="nav-button">{{ name }}</button>
                    <div class="dropdown-content">
                        {{ render_menu(item.handler) }}
                    </div>
                </div>
            {% else %}
                 <a href="{{ item.nav_path if item.nav_path else '/action/' + item.handler }}" class="nav-button-link">{{ name }}</a>
            {% endif %}
        {% endfor %}
    {% endmacro %}

    <nav class="navbar">
        <a href="/" class="nav-brand">BIC IPAM</a>
        <div class="nav-links">
            {{ render_menu(menu) }}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
