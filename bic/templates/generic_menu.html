{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<section>
    <h1>{{ menu.name }}</h1>
    <ul>
        {% for item in menu.items %}
            {% if not item.hidden %}
                <li><a href="/page{{ item.path }}">{{ item.name }}</a></li>
            {% endif %}
        {% endfor %}
    </ul>
</section>
{% endblock %}
