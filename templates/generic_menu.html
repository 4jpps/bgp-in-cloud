{% extends "base.html" %}

{% block title %}{{ item.name }}{% endblock %}

{% block content %}
<section>
    <h1>{{ item.name }}</h1>
    <ul>
        {% for subitem in item.items %}
            {% if not subitem.hidden %}
                <li><a href="{{ request.url.path }}/{{ subitem.path }}">{{ subitem.name }}</a></li>
            {% endif %}
        {% endfor %}
    </ul>
</section>
{% endblock %}
