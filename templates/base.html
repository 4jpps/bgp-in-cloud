<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BIC IPAM{% endblock %}</title>
    <link href="{{ url_for('static', path='/style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">BIC IPAM</a>
        <div class="nav-links">
            <div class="nav-dropdown">
                <button class="nav-button">Client Management</button>
                <div class="dropdown-content">
                    <a href="/clients">View Clients</a>
                    <a href="/clients/add">Add Client</a>
                </div>
            </div>
            <div class="nav-dropdown">
                <button class="nav-button">Network Management</button>
                <div class="dropdown-content">
                    <a href="/network/pools">View IP Pools</a>
                    <a href="/network/pools/add">Add IP Pool</a>
                </div>
            </div>
            <div class="nav-dropdown">
                <button class="nav-button">System</button>
                <div class="dropdown-content">
                    <a href="/">Dashboard</a>
                    <a href="#">Settings</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
