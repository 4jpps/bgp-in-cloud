name: Create Release on Version Update

on:
  push:
    paths:
    - 'bic/__version__.py' # Triggers only when the version file changes

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for tagging and uploading assets

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11' # Matches your production environment

    - name: Extract Version
      id: get_version
      run: |
        # Matches: __version__ = "2026.03.20.0544"
        # The \K tells grep to drop everything before the version string
        VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' bic/__version__.py)
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "TAG_NAME=v$VERSION" >> $GITHUB_ENV

    - name: Verify Requirements
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        else
          echo "No requirements.txt found, skipping install check."
        fi

    - name: Create Release Archive
      run: |
        # Package the repo, excluding clutter
        tar -czvf release.tar.gz \
          --exclude='.git' \
          --exclude='.github' \
          --exclude='venv' \
          --exclude='__pycache__' \
          --exclude='*.pyc' \
          .

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ env.TAG_NAME }}
        name: Release ${{ env.TAG_NAME }}
        body: |
          ### bic IPAM/BGP Release: ${{ env.VERSION }}

          **Installation on Debian (Python 3.11):**
          1. `wget [link-to-release.tar.gz]`
          2. `tar -xzvf release.tar.gz`
          3. `python3 -m venv venv && source venv/bin/activate`
          4. `pip install -r requirements.txt`
        files: release.tar.gz
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
