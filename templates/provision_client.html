{% extends "base.html" %}

{% block title %}Provision New Client{% endblock %}

{% block content %}
    <h1>Provision New Client</h1>
    <form action="/action/clients/provision/new" method="post">
        <fieldset>
            <legend>Client Details</legend>
            <label for="name">Client Name</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Client Email</label>
            <input type="email" id="email" name="email">
        </fieldset>

        <fieldset>
            <legend>Client Type</legend>
            <label for="client_type">Type</label>
            <select id="client_type" name="client_type">
                <option value="Standard" selected>Standard (Static IPs/Subnets)</option>
                <option value="BGP">BGP Peer</option>
            </select>
            <small>If BGP is selected, the next available private ASN will be assigned automatically.</small>
        </fieldset>

        <fieldset id="assignments-container">
            <legend>IP Assignments</legend>
            <div id="assignments-wrapper">
                <!-- Assignment rows will be injected here by JavaScript -->
            </div>
            <button type="button" onclick="addAssignmentRow()">+ Add IP/Subnet Assignment</button>
        </fieldset>

        <hr>
        <button type="submit">Provision Client</button>
    </form>

    <!-- Template for a new assignment row -->
    <template id="assignment-row-template">
        <div class="assignment-row">
            <select name="assignment_pool_id" onchange="updatePrefixOptions(this)">
                {% for pool in pools %}
                    <option value="{{ pool.id }}" data-cidr="{{ pool.cidr }}">{{ pool.description or pool.name }}</option>
                {% endfor %}
            </select>
            <select name="assignment_type" onchange="togglePrefixInput(this)">
                <option value="static">Single IP</option>
                <option value="subnet">Subnet</option>
            </select>
            <select name="assignment_prefix" style="display: none;">
                <!-- Options will be populated by JavaScript -->
            </select>
            <button type="button" onclick="this.parentElement.remove()">Remove</button>
        </div>
    </template>

<script>
function addAssignmentRow() {
    const template = document.getElementById('assignment-row-template');
    const wrapper = document.getElementById('assignments-wrapper');
    const clone = template.content.cloneNode(true);
    wrapper.appendChild(clone);
    // Initialize prefix options for the new row
    const poolSelect = clone.querySelector('select[name="assignment_pool_id"]');
    const typeSelect = clone.querySelector('select[name="assignment_type"]');
    updatePrefixOptions(poolSelect);
    togglePrefixInput(typeSelect);
}

function togglePrefixInput(selectElement) {
    const prefixSelect = selectElement.nextElementSibling;
    const poolSelect = selectElement.previousElementSibling;
    const selectedOption = poolSelect.options[poolSelect.selectedIndex];
    const cidr = selectedOption.getAttribute('data-cidr');
    const isIPv6 = cidr.includes(':');
    
    if (selectElement.value === 'static') {
        // Single IP - hide prefix dropdown
        prefixSelect.style.display = 'none';
    } else {
        // Subnet - show prefix dropdown with appropriate options
        prefixSelect.style.display = 'inline-block';
        // Clear existing options
        prefixSelect.innerHTML = '';
        
        // Add appropriate subnet options (exclude /32 and /128)
        const options = isIPv6 ? ['/64', '/56'] : ['/29', '/27'];
        options.forEach(prefix => {
            const option = document.createElement('option');
            option.value = prefix.substring(1); // Remove the / 
            option.textContent = prefix;
            prefixSelect.appendChild(option);
        });
    }
}

function updatePrefixOptions(poolSelect) {
    // This function is called when pool changes, but we mainly use it to ensure
    // the prefix options are updated when needed. The actual logic is in togglePrefixInput.
    const typeSelect = poolSelect.nextElementSibling;
    togglePrefixInput(typeSelect);
}

// Add one assignment row to start with
document.addEventListener('DOMContentLoaded', addAssignmentRow);
</script>

<style>
    .assignment-row {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 10px;
    }
    .assignment-row select,
    .assignment-row input {
        flex-grow: 1;
    }
</style>
{% endblock %}
