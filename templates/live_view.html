{% extends \"base.html\" %}\n\n{% block title %}Live System View{% endblock %}\n\n{% block content %}\n<h1 class=\"text-2xl font-bold mb-6\">Live System View</h1>\n\n<div class=\"grid grid-cols-1 lg:grid-cols-2 gap-6\">\n    <!-- Statistics Panel -->\n    <div class=\"card\">\n        <h2 class=\"text-xl font-semibold mb-4\">System Statistics</h2>\n        <div id=\"stats-container\" class=\"space-y-4\"></div>\n    </div>\n\n    <!-- Log Panel -->\n    <div class=\"card\">\n        <h2 class=\"text-xl font-semibold mb-4\">Live Console Log</h2>\n        <pre id=\"log-container\" class=\"bg-gray-100 dark:bg-gray-800 p-4 rounded-md overflow-y-auto h-96\"></pre>\n    </div>\n</div>\n\n<script>\n    const statsContainer = document.getElementById(\'stats-container\');\n    const logContainer = document.getElementById(\'log-container\');\n    \n    const ws = new WebSocket(`ws://${window.location.host}/ws/live`);\n\n    ws.onmessage = function(event) {\n        const data = JSON.parse(event.data);\n\n        if (data.type === \'stats\') {\n            statsContainer.innerHTML = `\n                <p><strong>CPU Usage:</strong> ${data.payload.cpu_percent}%</p>\n                <p><strong>Memory Usage:</strong> ${data.payload.mem_percent}%</p>\n                <p><strong>Uptime:</strong> ${data.payload.uptime}</p>\n                <p><strong>Network RX:</strong> ${data.payload.net_rx}</p>\n                <p><strong>Network TX:</strong> ${data.payload.net_tx}</p>\n            `;\n        } else if (data.type === \'log\') {\n            logContainer.textContent += data.payload + \'\\n\';\n            logContainer.scrollTop = logContainer.scrollHeight;\n        }\n    };\n\n    ws.onclose = function() {\n        logContainer.textContent += \'\\n--- WebSocket Closed ---\\n\';\n    };\n\n    ws.onerror = function(error) {\n        logContainer.textContent += `\\n--- WebSocket Error: ${error} ---\\n\`;\n    };\n</script>\n{% endblock %}\n
