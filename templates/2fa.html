{% extends "base.html" %}

{% block title %}Two-Factor Authentication{% endblock %}

{% block content %}
<div class="flex items-center justify-center h-full">
    <div class="w-full max-w-md">
        <div class="card">
            <h1 class="text-2xl font-bold text-center mb-6">Two-Factor Authentication</h1>
            <p class="text-center mb-4">Please enter your YubiKey OTP or Google Authenticator code.</p>
            <form method="post" action="/action/auth/2fa">
                <div class="mb-4">
                    <label for="otp" class="block text-sm font-medium text-gray-700 dark:text-gray-300">OTP</label>
                    <input type="text" name="otp" id="otp" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-300 focus:ring focus:ring-indigo-200 focus:ring-opacity-50 dark:bg-gray-700 dark:border-gray-600" required autofocus>
                </div>
                <div class="flex items-center justify-between">
                    <button type="submit" class="action-button-green w-full">Verify</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
