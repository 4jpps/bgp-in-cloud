{% extends "base.html" %}

{% block title %}Provision New Client{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-6">Provision New Client</h1>

<form method="post" action="{{ url_for('handle_provision_client') }}" id="provision-form">
    <div class="card mb-6">
        <h2 class="text-xl font-semibold mb-4">Client Details</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label for="client_name">Client Name:</label>
                <input type="text" id="client_name" name="client_name" required>
            </div>
            <div>
                <label for="client_email">Client Email:</label>
                <input type="email" id="client_email" name="client_email" required>
            </div>
            <div>
                <label for="client_type">Client Type:</label>
                <select id="client_type" name="client_type" onchange="toggleAsnField()">
                    <option value="Standard">Standard</option>
                    <option value="Transit">Transit</option>
                </select>
            </div>
            <div id="asn-field" style="display: none;">
                <label for="asn">ASN:</label>
                <input type="number" id="asn" name="asn">
            </div>
        </div>
    </div>

    <div class="card">
        <h2 class="text-xl font-semibold mb-4">IP & Subnet Assignments</h2>
        <div id="assignments-container" class="space-y-4"></div>
        <div class="mt-4">
            <button type="button" onclick="addAssignment()" class="action-button">+ Add Assignment</button>
        </div>
    </div>

    <div class="mt-6">
        <button type="submit" class="action-button-green">Provision Client</button>
    </div>
</form>

<script>
function toggleAsnField() {
    const clientType = document.getElementById('client_type').value;
    const asnField = document.getElementById('asn-field');
    asnField.style.display = clientType === 'Transit' ? 'block' : 'none';
}

let assignmentIndex = 0;

function addAssignment() {
    const container = document.getElementById('assignments-container');
    const assignmentId = `assignment-${assignmentIndex}`;
    
    const div = document.createElement('div');
    div.className = 'p-4 border rounded-md bg-gray-50 dark:bg-gray-800';
    div.id = assignmentId;

    div.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label for="assignment_pool_id_${assignmentIndex}">Pool:</label>
                <select name="assignment_pool_id[]" id="assignment_pool_id_${assignmentIndex}" onchange="togglePrefixField('${assignmentId}')" required>
                    <option value="">-- Select Pool --</option>
                    {% for pool in pools %}
                        <option value="{{ pool.id }}">{{ pool.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="assignment_type_${assignmentIndex}">Type:</label>
                <select name="assignment_type[]" id="assignment_type_${assignmentIndex}" onchange="togglePrefixField('${assignmentId}')" required>
                    <option value="static">Static IP</option>
                    <option value="subnet">Subnet</option>
                </select>
            </div>
            <div class="prefix-field" style="display: none;">
                <label for="assignment_prefix_${assignmentIndex}">Prefix Length:</label>
                <input type="number" name="assignment_prefix[]" id="assignment_prefix_${assignmentIndex}">
            </div>
        </div>
        <div class="mt-2 text-right">
            <button type="button" onclick="removeAssignment('${assignmentId}')" class="text-red-500 hover:text-red-700">Remove</button>
        </div>
    `;

    container.appendChild(div);
    assignmentIndex++;
}

function togglePrefixField(assignmentId) {
    const assignmentDiv = document.getElementById(assignmentId);
    const typeSelect = assignmentDiv.querySelector('select[name="assignment_type[]"]');
    const prefixField = assignmentDiv.querySelector('.prefix-field');
    prefixField.style.display = typeSelect.value === 'subnet' ? 'block' : 'none';
}

function removeAssignment(assignmentId) {
    const assignmentDiv = document.getElementById(assignmentId);
    assignmentDiv.remove();
}

// Initial state
toggleAsnField();
</script>
{% endblock %}
