{% extends "base.html" %}

{% block title %}Clients{% endblock %}

{% block content %}
    <h1>Clients</h1>
    <a href="/clients/add" class="button">Add New Client</a>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for client in clients %}
            <tr>
                <td>{{ client.id }}</td>
                <td><a href="/client/{{ client.id }}">{{ client.name }}</a></td>
                <td>{{ client.email }}</td>
                <td>
                    <a href="/client/{{ client.id }}/edit">Edit</a> |
                    <a href="/client/{{ client.id }}/delete" onclick="return confirm('Are you sure you want to delete this client?');">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
