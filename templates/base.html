<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BIC IPAM{% endblock %}</title>
    <link href="{{ url_for('static', path='/style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">BIC IPAM</a>
        <div class="nav-links">
            {% for name, item in menu.items() %}
                {% if item.type == 'submenu' %}
                    <div class="nav-dropdown">
                        <button class="nav-button">{{ name }}</button>
                        <div class="dropdown-content">
                            {% for sub_name, sub_item in item.handler.items() %}
                                <a href="{{ sub_item.nav_path if sub_item.nav_path else '/action/' + sub_item.handler }}">{{ sub_name }}</a>
                            {% endfor %}
                        </div>
                    </div>
                {% else %}
                    <a href="{{ item.nav_path if item.nav_path else '/action/' + item.handler }}" class="nav-button">{{ name }}</a>
                {% endif %}
            {% endfor %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
